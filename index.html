<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeFire Shop - Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1b2a;
  color:#fff;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}
.hero h1{
  font-size:32px;
  background:linear-gradient(90deg,#00d9ff,#8a2be2);
  -webkit-background-clip:text;
  color:transparent;
}

/* SERVICE SELECT */
.service-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:20px;
}
.service-card{
  background:#111;
  padding:20px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.service-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px #00d9ff;
}
.service-card.active{
  background:linear-gradient(135deg,#00d9ff,#47ff7a);
  color:#000;
}
.icon{
  font-size:28px;
}

/* PACKAGES */
.section{
  padding:20px;
}
.card{
  background:#111;
  padding:18px;
  border-radius:16px;
  margin-bottom:12px;
}
.btn{
  display:block;
  background:#00d9ff;
  color:#000;
  padding:10px;
  text-align:center;
  border-radius:10px;
  margin-top:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🔥 FreeFire Premium Shop 🔥</h1>
  <p>Select your service below</p>
</div>

<div class="service-grid">
  <div class="service-card active" onclick="showService('glory', this)">
    <div class="icon">🤖</div>
    <h3>Guild Glory</h3>
  </div>

  <div class="service-card" onclick="showService('like', this)">
    <div class="icon">💖</div>
    <h3>Like Service</h3>
  </div>

  <div class="service-card" onclick="showService('panel', this)">
    <div class="icon">💻</div>
    <h3>Panel Sell</h3>
  </div>
</div>

<!-- GUILD -->
<div id="glory" class="section">
  <div class="card">🤖 4 BOT - 230৳<a class="btn" href="#">Order</a></div>
  <div class="card">🤖 8 BOT - 450৳<a class="btn" href="#">Order</a></div>
</div>

<!-- LIKE -->
<div id="like" class="section" style="display:none;">
  <div class="card">100 Like (1 Day) - 10৳<a class="btn" href="#">Order</a></div>
  <div class="card">100 Like (30 Days) - 250৳<a class="btn" href="#">Order</a></div>
</div>

<!-- PANEL -->
<div id="panel" class="section" style="display:none;">
  <div class="card">1 Day Panel - 160৳<a class="btn" href="#">Order</a></div>
  <div class="card">30 Days Panel - 1300৳<a class="btn" href="#">Order</a></div>
</div>

<script>
function showService(type, el){
  document.getElementById("glory").style.display="none";
  document.getElementById("like").style.display="none";
  document.getElementById("panel").style.display="none";

  document.getElementById(type).style.display="block";

  document.querySelectorAll(".service-card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
